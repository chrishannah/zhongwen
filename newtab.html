<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="card">
    <p class="character" id="character"></p>
    <p class="pinyin" id="pinyin"></p>
    <p class="phonetic" id="phonetic"></p>
    <p class="meaning" id="meaning"></p>
  </main>

  <a id="photo-credit" href="#" target="_blank" style="display:none"></a>

  <button id="settings-toggle" aria-label="Settings">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="10" r="3"/>
      <path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M3.4 3.4l1.4 1.4M15.2 15.2l1.4 1.4M3.4 16.6l1.4-1.4M15.2 4.8l1.4-1.4"/>
    </svg>
  </button>

  <div id="settings-panel" class="hidden">
    <h2>Word Categories</h2>
    <label>
      <input type="checkbox" checked disabled>
      HSK 1 <span class="label-desc">— essential characters</span>
    </label>
    <label>
      <input type="checkbox" id="opt-hsk2">
      HSK 2 <span class="label-desc">— common vocabulary</span>
    </label>
    <label>
      <input type="checkbox" id="opt-internet">
      Internet <span class="label-desc">— web navigation terms</span>
    </label>
    <label>
      <input type="checkbox" id="opt-software">
      Software <span class="label-desc">— development terms</span>
    </label>
    <hr>
    <h2>Background</h2>
    <label class="api-key-label">
      Unsplash API Key
      <input type="text" id="unsplash-key" placeholder="Enter your access key" spellcheck="false">
    </label>
    <p class="api-key-hint">Free at <a href="https://unsplash.com/developers" target="_blank">unsplash.com/developers</a></p>
  </div>

  <script src="js/newtab.js"></script>
</body>
</html>
